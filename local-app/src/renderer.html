<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room 101 Print Service</title>
    <link rel="stylesheet" href="./renderer.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local Print Service</p>
          <h1>Room 101</h1>
        </div>
        <div class="actions">
          <button id="restart" class="icon-button" title="重启服务" aria-label="重启服务">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
          </button>
          <button id="site" class="icon-button" title="打开打印网站" aria-label="打开打印网站">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
          </button>
        </div>
      </header>

      <section id="status" class="status-card" data-phase="starting">
        <div class="pulse"></div>
        <div>
          <p class="status-label">正在启动</p>
          <p id="status-message" class="status-message">正在启动本地打印服务</p>
        </div>
      </section>

      <section class="admin-frame-wrap">
        <div id="placeholder" class="placeholder">
          <div class="spinner"></div>
        </div>
        <iframe id="admin-frame" title="609 local admin" src="about:blank"></iframe>
      </section>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
